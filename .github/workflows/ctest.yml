name: myknn C tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ctest:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - name: Build and run C unit tests
        shell: bash
        run: |
          CC=cc
          LM="-lm"
          if [ "$RUNNER_OS" = "Windows" ]; then
            CC=gcc
            LM=""
          fi
          $CC -std=c11 -O3 -march=native -Wall -Wextra -Isrc \
            -o .devel/ctest/test_kdtree \
            .devel/ctest/test_kdtree.c src/kdtree.c $LM
          .devel/ctest/test_kdtree
