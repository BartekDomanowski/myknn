name: myknn for R

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::tinytest
      - name: Install and test
        shell: bash
        run: |
          R CMD INSTALL .
          Rscript -e 'source(".devel/tinytest.R")'
      - name: Check R package (CRAN, Linux only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cd ..
          R CMD build myknn
          _R_CHECK_CRAN_INCOMING_REMOTE_=FALSE \
          _R_CHECK_FORCE_SUGGESTS_=0 \
          R CMD check "$(ls -t myknn_*.tar.gz | head -1)" --as-cran --no-manual
